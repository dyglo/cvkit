version: '3.8'

services:
  cvkit:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CVKIT_OPENAI_KEY=${CVKIT_OPENAI_KEY}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvkit
      POSTGRES_USER: cvkit
      POSTGRES_PASSWORD: cvkit_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
